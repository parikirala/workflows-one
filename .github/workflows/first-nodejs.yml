name: fifth-workflow

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run linter
        run: echo "Running linter..."

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run tests
        run: echo "Running tests..."

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create artifacts directory structure
        run: |
          echo "Creating artifact directories..."
          mkdir -p artifacts/build-${{ github.run_number }}
          mkdir -p artifacts/build-${{ github.run_number }}/src
          mkdir -p artifacts/build-${{ github.run_number }}/logs
          ls -la artifacts/

      - name: Generate build artifacts
        run: |
          echo "Generating build artifacts for Build #${{ github.run_number }}"
          
          # Create tarball
          tar -czf artifacts/build-${{ github.run_number }}/app-${{ github.run_number }}.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=artifacts \
            .
          
          # Copy source files
          cp package.json artifacts/build-${{ github.run_number }}/
          cp -r src/* artifacts/build-${{ github.run_number }}/src/ 2>/dev/null || echo "No src directory found"
          
          # Create build metadata
          cat > artifacts/build-${{ github.run_number }}/build-manifest.json <<'EOF'
          {
            "buildNumber": ${{ github.run_number }},
            "buildTimestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commitSha": "${{ github.sha }}",
            "branch": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "artifactName": "app-${{ github.run_number }}.tar.gz"
          }
          EOF
          
          # Create build log
          cat > artifacts/build-${{ github.run_number }}/logs/build.log <<'EOF'
          Build Information
          =================
          Build Number: ${{ github.run_number }}
          Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          Actor: ${{ github.actor }}
          Status: SUCCESS
          EOF
          
          echo "Artifact structure created successfully:"
          find artifacts/build-${{ github.run_number }} -type f
          echo "---"
          du -sh artifacts/build-${{ github.run_number }}/*

      - name: Verify artifacts were created
        run: |
          echo "Verifying artifacts..."
          if [ -d "artifacts/build-${{ github.run_number }}" ]; then
            echo "✓ Artifact directory exists"
            ls -lhR artifacts/build-${{ github.run_number }}/
          else
            echo "✗ ERROR: Artifact directory not found!"
            exit 1
          fi

      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_number }}-artifacts
          path: artifacts/build-${{ github.run_number }}/
          retention-days: 30
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create deployment workspace
        run: |
          mkdir -p deployment/incoming
          mkdir -p deployment/processed
          mkdir -p deployment/logs
          echo "Deployment workspace created"
          ls -la deployment/

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_number }}-artifacts
          path: deployment/incoming/

      - name: Verify downloaded artifacts
        run: |
          echo "Checking downloaded artifacts..."
          if [ -z "$(ls -A deployment/incoming/)" ]; then
            echo "✗ ERROR: No artifacts downloaded!"
            exit 1
          fi
          echo "✓ Artifacts found:"
          ls -lhR deployment/incoming/

      - name: Process and stage artifacts
        run: |
          echo "Processing artifacts for deployment..."
          
          # Extract tarball if it exists
          TARBALL=$(find deployment/incoming -name "*.tar.gz" -type f)
          if [ -n "$TARBALL" ]; then
            echo "Found tarball: $TARBALL"
            tar -xzf "$TARBALL" -C deployment/processed/
            echo "Tarball extracted successfully"
          fi
          
          # Copy metadata
          cp deployment/incoming/* deployment/processed/ 2>/dev/null || true
          
          echo "Processed artifacts:"
          ls -lhR deployment/processed/

      - name: Create deployment report
        run: |
          cat > deployment/logs/deployment-report.txt <<'EOF'
          ========================================
          DEPLOYMENT REPORT
          ========================================
          Build Number: ${{ github.run_number }}
          Deployment Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          Deployed By: ${{ github.actor }}
          
          Artifacts Location: deployment/incoming/
          Processed Location: deployment/processed/
          
          Status: SUCCESS
          ========================================
          EOF
          
          cat deployment/logs/deployment-report.txt

      - name: Display deployment summary
        run: |
          echo "================================"
          echo "FINAL DEPLOYMENT SUMMARY"
          echo "================================"
          echo ""
          echo "Artifact Directories:"
          du -sh deployment/*
          echo ""
          echo "All Deployment Files:"
          find deployment -type f
          echo ""
          echo "================================"
